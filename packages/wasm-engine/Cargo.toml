[package]
name = "wasm-engine"
version = "0.1.0"
edition = "2021"
description = "Algorithm Atlas WASM engine — instrumented sort algorithms for browser execution"

[lib]
name = "wasm_engine"
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
algorithm-atlas-sdk = { path = "../plugin-sdk/rust" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
