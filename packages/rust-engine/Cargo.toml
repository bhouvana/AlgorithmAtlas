[package]
name = "algorithm-atlas-rs"
version = "0.1.0"
edition = "2021"

[lib]
name = "algorithm_atlas_rs"
crate-type = ["cdylib", "rlib"]
# cdylib  → native .so/.pyd for PyO3
# rlib    → static lib for wasm-pack WASM builds
# Note: wasm-pack builds override crate-type automatically

[dependencies]
pyo3                = { version = "0.21", features = ["extension-module"] }
rayon               = "1.10"
rand                = "0.8"
rand_pcg            = "0.3"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
algorithm-atlas-sdk = { path = "../plugin-sdk/rust" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "sort_bench"
harness = false

[features]
default = ["pyo3/extension-module"]
# wasm feature: disable pyo3, enable wasm-bindgen
wasm = []

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
