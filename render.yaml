services:
  # ── Backend — FastAPI in Docker (all 17 language runtimes) ───────────────────
  - type: web
    name: algorithm-atlas-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./apps/backend/Dockerfile
    # dockerContext defaults to repo root — needed so COPY plugins/ works
    envVars:
      - key: PLUGIN_ROOT
        value: /plugins
      - key: SQLITE_URL
        value: sqlite+aiosqlite:///./atlas.db
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["https://algorithm-atlas.onrender.com"]'
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Atlas AI provider pool round-robins across Groq + both Ollama Cloud
      # keys (see apps/backend/algorithm_atlas/ai/provider.py) and falls
      # forward on rate limit/outage -- without these two, Groq alone is a
      # single point of failure in production. Set the actual key values in
      # the Render dashboard (sync: false means "secret, not stored in git").
      - key: OLLAMA_API_KEY_1
        sync: false
      - key: OLLAMA_API_KEY_2
        sync: false
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/v1

  # ── Frontend — React / Vite static site ──────────────────────────────────────
  - type: web
    name: algorithm-atlas
    env: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://algorithm-atlas-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
