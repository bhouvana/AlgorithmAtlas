services:
  # ── Backend — FastAPI in Docker (all 17 language runtimes) ───────────────────
  - type: web
    name: algorithm-atlas-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./apps/backend/Dockerfile
    # dockerContext defaults to repo root — needed so COPY plugins/ works
    envVars:
      - key: PLUGIN_ROOT
        value: /plugins
      - key: SQLITE_URL
        value: sqlite+aiosqlite:///./atlas.db
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["https://algorithm-atlas.onrender.com"]'

  # ── Frontend — React / Vite static site ──────────────────────────────────────
  - type: web
    name: algorithm-atlas
    env: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://algorithm-atlas-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
