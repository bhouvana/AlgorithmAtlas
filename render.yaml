services:
  # ── Backend — FastAPI + uvicorn ───────────────────────────────────────────────
  - type: web
    name: algorithm-atlas-api
    env: python
    plan: free
    region: oregon
    buildCommand: >-
      pip install -e ./packages/plugin-sdk/python &&
      pip install -e ./apps/backend
    startCommand: uvicorn algorithm_atlas.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLUGIN_ROOT
        value: /opt/render/project/src/plugins
      - key: SQLITE_URL
        value: sqlite+aiosqlite:///./atlas.db
      - key: LOG_LEVEL
        value: INFO
      # Update this after the frontend is deployed with the actual URL
      - key: CORS_ORIGINS
        value: https://algorithm-atlas.onrender.com

  # ── Frontend — React / Vite static site ──────────────────────────────────────
  - type: web
    name: algorithm-atlas
    env: static
    plan: free
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Must match the backend service name above: https://<name>.onrender.com
      - key: VITE_API_URL
        value: https://algorithm-atlas-api.onrender.com
    routes:
      # SPA fallback — all paths serve index.html (React Router handles routing)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Cache static assets aggressively, HTML never
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
